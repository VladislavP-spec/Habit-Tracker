<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <div class="app">
      <div class="panel">
        <div class="logo">
          <img class="logo__img" src="./images/Logomark.svg" alt="Logo Habbit App" />
          <p class="logo__name">Habbit</p>
        </div>
        <nav class="menu">
          <div class="menu__list"></div>
          <button class="menu__add" onclick="toggleCover()">
            <img src="./images/add.svg" alt="Add habbit" />
          </button>
        </nav>
      </div>
      <div class="content">
        <header>
          <h1 class="h1">-</h1>
          <div class="progress">
            <div class="progress__text">
              <div class="progress__name">Прогресс</div>
              <div class="progress__percent">%</div>
            </div>
            <div class="progress__bar">
              <div class="progress__cover-bar"></div>
            </div>
          </div>
        </header>
        <main>          
          <div id="days"></div>         
          <div class="habbit">
            <div class="habbit__day">День _</div>
            <form class="habbit__form" onsubmit="addDays(event)">
              <img class="habbit__img" src="images/comment.svg" alt="icon-comment">
              <input  name="comment" class="habbit__input" type="text" placeholder="comment">
              <button class="habbit__create" type="submit">Готово</button> 
            </form>
            
          </div>          
        </main>
      </div>
      <div class="cover cover_hidden">
        <div class="popup">
            <h2 class="popup__title">Новая привычка</h2>
            <div class="popup__label">Иконка</div>
            <div class="popup__icon-select">
              <button class="icon icon_active" onclick="setIcon(this, 'sport')">
                <img src="./images/sport.svg" alt="Sport icon">
              </button>
              <button class="icon" onclick="setIcon(this, 'water')">
                <img src="./images/water.svg" alt="Water icon">
              </button>
              <button class="icon" onclick="setIcon(this, 'food')">
                <img src="./images/food.svg" alt="Food icon">
              </button>
            </div>
            <form class="popup__form" onsubmit="addHabbit(event)">
                <input name="name" class="popup__input-name" type="text" placeholder="Название">
                <input name="icon" class="popup__input-icon" type="text" hidden placeholder="Иконка" value="sport">
                <input name="target" class="popup__input-target" type="number" placeholder="Цель">
                <button class="button" type="submit">Добавить</button> 
            </form>
            <button class="popup__close" onclick="toggleCover()">
              <img src="./images/close.svg" alt="Close popup">
            </button>
        </div>
      </div>
    </div>
    <script src="./scripts/app.js"></script>
  </body>
</html>
